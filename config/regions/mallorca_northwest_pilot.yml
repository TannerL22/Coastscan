region_id: mallorca_northwest_pilot
region_name: Mallorca Northwest Real Pilot
country: Spain
analysis_crs: EPSG:25831
output_crs: EPSG:4326
inputs:
  coastline:
    mode: direct
    path: data/raw/coastline/LC/COSTA/COSTA.shp
    source_id: ihm_spain_coastline
    source_id_field: LOCALID
    source_class_field: CATEGORIA
    duplicate_tolerance_m: 10
    feature_filters:
      - field: CIERRACOST
        accepted_values: [true]
      - field: PLEAMAR
        accepted_values: [true]
      - field: CATEGORIA
        accepted_values: [COALNE, COSTA_ESCARPADA, ORILLA_ARENA]
  land_polygon:
    path: data/raw/boundaries/LINEAS_LIMITE/SHP_ETRS89/recintos_municipales_inspire_peninbal_etrs89/recintos_municipales_inspire_peninbal_etrs89.shp
    source_id: cnig_administrative_boundaries
    role: orientation_mask
    selection_filters:
      - field: NATCODE
        accepted_values:
          - "34040707001"
          - "34040707003"
          - "34040707004"
          - "34040707005"
          - "34040707006"
          - "34040707007"
          - "34040707008"
          - "34040707009"
          - "34040707010"
