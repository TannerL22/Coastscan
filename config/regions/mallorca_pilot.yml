region_id: mallorca_pilot
region_name: Mallorca Pilot
country: Spain
analysis_crs: EPSG:25831
output_crs: EPSG:4326
inputs:
  land_polygon:
    path: data/raw/boundaries/mallorca_land.gpkg
    layer: land
    source_id: mallorca_land_local
  elevation:
    path: data/raw/elevation/mallorca_dem.tif
    source_id: mallorca_dem_local
coastline:
  target_segment_length_m: 250
  minimum_segment_length_m: 75
  simplification_tolerance_m: 2
  orientation_test_distance_m: 20
  orientation_fallback_distances_m: [40, 80, 150]
  include_interior_shorelines: false
transects:
  spacing_m: 25
  inland_length_m: 100
  offshore_length_m: 200
terrain:
  relief_distances_m: [25, 50, 100]
  sample_spacing_m: 5
  steep_slope_threshold_degrees: 35
  roughness_window_m: 15
  minimum_valid_sample_share: 0.7
  write_samples: false
quality:
  maximum_ambiguous_orientation_share: 0.02
  maximum_missing_terrain_share: 0.05
  random_qa_sample_size: 50

